<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      background: #f5f5f5;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header {
      background: #2c3e50;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    header h1 { margin-bottom: 10px; }
    header a { color: #3498db; text-decoration: none; }
    .post-list { margin-top: 30px; }
    .post-card {
      background: white;
      padding: 25px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .post-card:hover { transform: translateY(-3px); }
    .post-card h2 { margin-bottom: 10px; }
    .post-card h2 a { color: #2c3e50; text-decoration: none; }
    .post-card h2 a:hover { color: #3498db; }
    .post-date { color: #999; font-size: 0.9em; margin-bottom: 15px; }
    .post-excerpt { color: #666; }
    .admin-link {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #3498db;
      color: white;
      padding: 15px 25px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .admin-link:hover { background: #2980b9; }
    footer { text-align: center; padding: 30px; color: #999; }
  </style>
</head>
<body>
  <header>
    <h1 id="site-title">加载中...</h1>
    <p id="site-description"></p>
  </header>
  
  <div class="container">
    <div class="post-list" id="post-list"></div>
  </div>
  
  <a href="/admin" class="admin-link">管理后台</a>
  
  <footer>
    <p>Powered by My Blog</p>
  </footer>
  
  <script>
    async function loadPosts() {
      try {
        const [configRes, postsRes] = await Promise.all([
          fetch('/api/config'),
          fetch('/api/posts')
        ]);
        
        const config = await configRes.json();
        const posts = await postsRes.json();
        
        document.getElementById('site-title').textContent = config.siteTitle;
        document.getElementById('site-description').textContent = config.siteDescription;
        
        const postList = document.getElementById('post-list');
        if (posts.length === 0) {
          postList.innerHTML = '<p style="text-align:center;color:#999;">暂无文章</p>';
          return;
        }
        
        postList.innerHTML = posts.map(post => `
          <div class="post-card">
            <h2><a href="/post/${post.slug}">${post.title}</a></h2>
            <div class="post-date">${new Date(post.date).toLocaleDateString('zh-CN')}</div>
            <div class="post-excerpt">${post.excerpt}</div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('post-list').innerHTML = '<p style="color:red;">加载失败</p>';
      }
    }
    
    loadPosts();
  </script>
</body>
</html>
